# SonarQube / SonarCloud Configuration Placeholder
sonar.projectKey=beyondnet-monorepo
sonar.organization=beyondnet
sonar.host.url=https://sonarcloud.io

# Source code directories
sonar.sources=apps/webapp/src,libs/backend
