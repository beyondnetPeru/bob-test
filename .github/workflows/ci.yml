name: CI Pipeline

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dependencies
        run: npm ci

      - name: Lint and Format verification
        run: npx nx run-many -t lint

      - name: Test Frontend
        run: npx nx run-many -t test --projects=webapp --passWithNoTests

      - name: Build Projects
        run: npx nx run-many -t build --all

      - name: Test Backend
        run: dotnet test apps/api-tests/Api.Tests.csproj /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:Threshold=50 /p:ThresholdType=line /p:Exclude="[Api]Api.Controllers.*%2c[Api]Api.Migrations.*%2c[Api]Api.Middleware.*"
